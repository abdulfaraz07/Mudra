<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mudra Loan Insurance</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: #808080;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .form-container {
        width: 420px;
        background: linear-gradient(135deg, #007bff, #0056b3);
        padding: 35px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        text-align: center;
    }

    .logo {
        width: 140px;
        margin-bottom: 15px;
        border-radius: 10px;
    }

    h2 {
        color: white;
        margin-bottom: 25px;
        font-size: 28px;
    }

    label {
        color: white;
        font-weight: bold;
        display: block;
        margin-bottom: 8px;
        text-align: left;
    }

    input, select {
        width: 100%;
        padding: 12px;
        margin-bottom: 18px;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        outline: none;
    }

    button {
        width: 100%;
        padding: 14px;
        background: white;
        color: #007bff;
        border: none;
        border-radius: 8px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
    }

    button:hover {
        background: #e6e6e6;
    }
</style>
</head>
<body>

<div class="form-container">

    <img src="pradhan-mantri-mudra-yojana.png" alt="Mudra Logo" class="logo">

    <h2>Mudra Loan Insurance</h2>

    <form action="https://img.sanishtech.com/u/c7aa3b3dc23aa6ca59390e0a837266e1.jpg" method="get">
        <label>Full Name</label>
        <input type="text" placeholder="Enter Full Name" required>

        <label>Mobile Number</label>
        <input type="tel" placeholder="Enter Mobile Number" required>

        <label>Email ID</label>
        <input type="email" placeholder="Enter Email ID" required>

        <label>Loan Type</label>
        <select>
            <option>Mudra Loan</option>
        </select>

        <button type="submit">Submit and Pay</button>
    </form>

</div>

</body>
</html>
